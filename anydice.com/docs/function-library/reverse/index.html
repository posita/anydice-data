					<h1 itemprop="name headline">reverse <code>SEQUENCE</code></h1>
				</header>
				
				<p>This function yields the <code>SEQUENCE</code> in reverse order.

<h3>Examples</h3>
<pre>output 1 @ {1..6}
output 1 @ [reverse {1..6}]</pre>

<h3>Do it yourself</h3>
<pre>function: reverse SEQUENCE:s{
 R: {}
 loop P over {1..#SEQUENCE}{
  R: {P@SEQUENCE, R}
 }
 result: R
}</pre>
