<!DOCTYPE html>
<html lang="en">
	<head prefix="og: http://ogp.me/ns#">
		<meta charset="utf-8">
		<meta property="og:url" content="https://anydice.com">
		<meta property="og:type" content="website">
		<meta property="og:image" content="https://anydice.com/anydice-banner.jpg">
		<meta property="og:title" content="AnyDice">
		<meta property="og:description" content="AnyDice is an advanced dice probability calculator, available online. It is created with roleplaying games in mind.">
		<meta name="twitter:card" content="summary">
		<meta property="twitter:creator" content="@catlikecoding">
		<title>AnyDice</title>
		<link rel="manifest" href="site.webmanifest.html">

		<link rel="stylesheet" type="text/css" href="css/anydice.css">
		<link rel="stylesheet" type="text/css" href="css/jqplot.css">
		<script type="application/ld+json">{
			"@context": "http://schema.org",
			"@type": "WebPage",
			"headline": "AnyDice",
			"description": "AnyDice is an advanced dice probability calculator, available online. It is created with roleplaying games in mind.",
			"publisher": { "@type": "Organization", "name": "Catlike Coding", "@id": "https://catlikecoding.com/#organization" },
			"image": "https://anydice.com/anydice-banner.jpg"
		}</script>
		<script src="js/jquery.all.js"></script>
		<script src="js/anydice.js"></script>
		<script>
			var loadedProgram = localStorage.getItem('program');
			if(!loadedProgram){
				loadedProgram = 'output 3d6';
			}
			</script>
	</head>
	<body>
		<div id="sidebar">
			<h1>AnyDice</h1>
			<h2>Dice Probability Calculator</h2>
			<div id="menu">
				<input id="calculatorPage-selector" class="selector selected" type="button" value="Calculator">
				<a href="articles/index.html" target="_blank" class="selector" style="width: 180px;">Articles</a>
				<a href="docs/index.html" target="_blank" class="selector" style="width: 180px;">Documentation</a>
				<a href="docs/function-library/index.html" target="_blank" class="selector" style="width: 180px;">Function Library</a>
				<a href="https://tawk.to/chat/597cdb5b0d1bb37f1f7a6735/default/?$_tawk_popout=true" class="selector" style="width: 180px;" target="_blank">Support Chat</a>
				<!-- <input id="donationPage-selector" class="selector" type="button" value="Please Donate!"> -->
				<a href="donation/index.html" target="_blank" class="selector" style="width: 180px;"><b>Please Donate!</b></a>
				<br>
				<a href="https://ko-fi.com/catlikecoding" class="support-ko-fi" title="support me on Ko-fi">Help me modernize AnyDice!<br><img src="logo-ko-fi.svg" width="145" height="100" alt="Support me on Ko-fi"></a>
				<br>
				<!-- Since 2025-12-07: Native <code>[highest 2 of 4d6 and 2d8 and 2d10]</code> and <code>lowest</code> functions. -->
			</div>
			
			<div id="footer">
				<a href="https://catlikecoding.com/jasper-flick/">made by Jasper Flick</a>
			</div>
		</div>
		<div id="calculatorPage" class="page">
			<input id="linkField" readonly value="click to create link">
			<textarea id="codeInput">output 3d4</textarea><br>
			<input id="calculateButton" type="button" value="Calculate">
			<div class="option">
				<h3>View</h3>
				<input id="tableDisplay-selector" class="selector selected" type="button" value="Table">
				<input id="graphDisplay-selector" class="selector" type="button" value="Graph">
				<input id="exportDisplay-selector" class="selector" type="button" value="Export">
				<input id="rollerDisplay-selector" class="selector" type="button" value="Roller">
			</div>
			<div class="option">
				<h3>Data</h3>
				<input id="normalMode-selector" class="selector selected" type="button" value="Normal">
				<input id="atLeastMode-selector" class="selector" type="button" value="At Least">
				<input id="atMostMode-selector" class="selector" type="button" value="At Most">
				<input id="transposedMode-selector" class="selector" type="button" value="Transposed">
				<input id="summaryMode-selector" class="selector" type="button" value="Summary">
			</div>
			<div id="calculatingDisplay" class="display hidden">...calculating...</div>
			<div id="warningDisplay" class="display hidden"></div>
			<div id="errorDisplay" class="display hidden"></div>
			<div id="tableDisplay" class="display hidden"></div>
			<div id="graphDisplay" class="display hidden"><div id="graphCanvas"></div></div>
			<div id="exportDisplay" class="display hidden"></div>
			<div id="rollerDisplay" class="display hidden">
				<select id="rollerSelect"></select>
				<input id="rollerAmount" type="text" size="2" value="6">
				<input type="button" id="rollerButton" value="Roll">
				<div id="rollerOutput" readonly></div>
			</div>
		</div>
		<div id="documentationPage" class="text page hidden"></div>
		<div id="functionPage" class="text page hidden"></div>
		<div id="donationPage" class="text page hidden"></div>
		<div id="donationPopup" class="hidden">
			Have you considered donating?
			<button data-reply="show">Show me how and why!</button>
			<button data-reply="remind">Remind me later.</button>
			<button data-reply="yes">Yes, I have already donated!</button>
			<button data-reply="no">No, and don't bother me again!</button>
		</div>
	</body>
</html>
